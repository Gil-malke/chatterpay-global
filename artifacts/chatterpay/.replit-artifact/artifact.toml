kind = "web"
previewPath = "/"
title = "ChatterPay Global"
version = "1.0.0"
id = "artifacts/chatterpay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21365

[services.development]
run = "pnpm --filter @workspace/chatterpay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatterpay", "run", "build" ]
publicDir = "artifacts/chatterpay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21365"
BASE_PATH = "/"
