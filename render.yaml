services:
  - type: web
    name: chatterpay-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PORT
        value: 3000
